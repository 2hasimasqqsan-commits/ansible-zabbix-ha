---
- name: Disable MariaDB auto-start because Pacemaker manages it
  ansible.builtin.systemd:
    name: "{{ mariadb_service_name }}"
    enabled: false
  failed_when: false

- name: Ensure DRBD mount point exists
  ansible.builtin.file:
    path: "{{ drbd_mount_point }}"
    state: directory
    owner: mysql
    group: mysql
    mode: "0755"

- name: Check Pacemaker cluster status
  ansible.builtin.command: crm status
  register: crm_status
  changed_when: false
  failed_when: false
  check_mode: false
  run_once: true

- name: Show Pacemaker cluster status before configuration
  ansible.builtin.debug:
    var: crm_status.stdout_lines
  run_once: true

- name: Fail if Pacemaker cluster has no DC
  ansible.builtin.fail:
    msg: "Pacemaker cluster has no Current DC. Fix cluster state before applying resources."
  when:
    - crm_status.rc == 0
    - "'Current DC: NONE' in crm_status.stdout"
  run_once: true

- name: Extract Pacemaker online node line
  ansible.builtin.shell: |
    crm status | grep -E '^\s*\* Online:' || true
  register: crm_online_line
  changed_when: false
  failed_when: false
  check_mode: false
  run_once: true

- name: Fail if not all DB nodes are online
  ansible.builtin.fail:
    msg: "Not all DB nodes are online. Fix node state before applying Pacemaker resources."
  when:
    - "'zbx-ha-db01' not in crm_online_line.stdout or 'zbx-ha-db02' not in crm_online_line.stdout"
  run_once: true

- name: Set Pacemaker basic properties
  ansible.builtin.shell: |
    crm configure property no-quorum-policy=ignore
  changed_when: false
  run_once: true

- name: Check existing Pacemaker configuration
  ansible.builtin.command: crm configure show
  register: crm_config
  changed_when: false
  failed_when: false
  run_once: true

- name: Show existing Pacemaker resource summary
  ansible.builtin.debug:
    msg:
      - "p_drbd_mysql exists: {{ 'p_drbd_mysql' in crm_config.stdout }}"
      - "ms_drbd_mysql exists: {{ 'ms_drbd_mysql' in crm_config.stdout }}"
      - "p_fs_mysql exists: {{ 'p_fs_mysql' in crm_config.stdout }}"
      - "p_mariadb exists: {{ 'p_mariadb' in crm_config.stdout }}"
      - "p_db_vip exists: {{ 'p_db_vip' in crm_config.stdout }}"
  run_once: true

- name: Configure Pacemaker resources for DRBD, filesystem, MariaDB and DB VIP
  ansible.builtin.shell: |
    crm configure primitive p_drbd_mysql ocf:linbit:drbd \
      params drbd_resource="{{ drbd_resource_name }}" \
      op monitor interval="15s" role="Promoted" \
      op monitor interval="30s" role="Unpromoted"

    crm configure clone ms_drbd_mysql p_drbd_mysql \
      meta promotable="true" \
           promoted-max="1" \
           promoted-node-max="1" \
           clone-max="2" \
           clone-node-max="1" \
           notify="true" \
           interleave="true"

    crm configure primitive p_fs_mysql ocf:heartbeat:Filesystem \
      params device="{{ drbd_device }}" \
             directory="{{ drbd_mount_point }}" \
             fstype="{{ drbd_fs_type }}" \
      op monitor interval="20s"

    crm configure primitive p_mariadb systemd:{{ mariadb_service_name }} \
      op monitor interval="20s"

    crm configure primitive p_db_vip ocf:heartbeat:IPaddr2 \
      params ip="{{ zabbix_db_vip }}" \
             cidr_netmask="{{ db_vip_cidr }}" \
             nic="{{ db_vip_nic }}" \
      op monitor interval="10s"
      op start timeout="20s" interval="0s" \
      op stop timeout="20s" interval="0s"

    crm configure colocation col_fs_on_drbd inf: p_fs_mysql ms_drbd_mysql:Promoted
    crm configure colocation col_mariadb_on_fs inf: p_mariadb p_fs_mysql
    crm configure colocation col_vip_on_mariadb inf: p_db_vip p_mariadb

    crm configure order ord_drbd_before_fs Mandatory: ms_drbd_mysql:promote p_fs_mysql:start
    crm configure order ord_fs_before_mariadb Mandatory: p_fs_mysql:start p_mariadb:start
    crm configure order ord_mariadb_before_vip Mandatory: p_mariadb:start p_db_vip:start
  when:
    - "'p_drbd_mysql' not in crm_config.stdout"
    - "'ms_drbd_mysql' not in crm_config.stdout"
    - "'p_fs_mysql' not in crm_config.stdout"
    - "'p_mariadb' not in crm_config.stdout"
    - "'p_db_vip' not in crm_config.stdout"
  run_once: true

- name: Refresh Pacemaker configuration before Zabbix resources
  ansible.builtin.command: crm configure show
  register: crm_config_after_db
  changed_when: false
  failed_when: false
  run_once: true

- name: Configure Pacemaker resources for Zabbix server, Apache and Web VIP
  ansible.builtin.shell: |
    crm configure primitive p_zabbix_server systemd:{{ zabbix_server_service_name }} \
      op monitor interval="20s" timeout="100s" \
      op start timeout="180s" interval="0s" \
      op stop timeout="300s" interval="0s"

    crm configure primitive p_apache systemd:{{ apache_service_name }} \
      op monitor interval="20s" timeout="100s" \
      op start timeout="120s" interval="0s" \
      op stop timeout="120s" interval="0s"

    crm configure primitive p_web_vip ocf:heartbeat:IPaddr2 \
      params ip="{{ zabbix_web_vip }}" \
             cidr_netmask="{{ web_vip_cidr }}" \
             nic="{{ web_vip_nic }}" \
      op monitor interval="10s" timeout="20s" \
      op start timeout="20s" interval="0s" \
      op stop timeout="20s" interval="0s"

    crm configure colocation col_zabbix_on_dbvip inf: p_zabbix_server p_db_vip
    crm configure colocation col_apache_on_zabbix inf: p_apache p_zabbix_server
    crm configure colocation col_webvip_on_apache inf: p_web_vip p_apache

    crm configure order ord_dbvip_before_zabbix Mandatory: p_db_vip:start p_zabbix_server:start
    crm configure order ord_zabbix_before_apache Mandatory: p_zabbix_server:start p_apache:start
    crm configure order ord_apache_before_webvip Mandatory: p_apache:start p_web_vip:start
  when: "'p_zabbix_server' not in crm_config_after_db.stdout"
  run_once: true

- name: Show final Pacemaker status
  ansible.builtin.command: crm status
  register: final_crm_status
  changed_when: false
  failed_when: false
  run_once: true

- name: Print final Pacemaker status
  ansible.builtin.debug:
    var: final_crm_status.stdout_lines
  run_once: true

- name: Verify Pacemaker configuration
  ansible.builtin.command: crm_verify -L
  register: crm_verify_result
  changed_when: false
  failed_when: false
  run_once: true

- name: Show crm_verify result
  ansible.builtin.debug:
    var: crm_verify_result.stdout_lines
  run_once: true

- name: Show final Pacemaker status
  ansible.builtin.command: crm status
  register: final_crm_status
  changed_when: false
  failed_when: false
  run_once: true

- name: Print final Pacemaker status
  ansible.builtin.debug:
    var: final_crm_status.stdout_lines
  run_once: true
